<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Coach Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#FF6B35;--primary-light:#fff0e8;--bg:#f5f6fa;--card:#fff;--text:#2d3436;--text2:#636e72;--border:#eee;--shadow:0 2px 12px rgba(0,0,0,.06);--radius:12px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;display:flex;min-height:100vh}
.sidebar{width:220px;background:linear-gradient(180deg,#1a1a2e,#16213e);color:#fff;padding:24px 0;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:10}
.sidebar .logo{padding:0 20px 24px;font-size:20px;font-weight:800;letter-spacing:.5px}
.sidebar .logo span{color:var(--primary)}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px 20px;cursor:pointer;font-size:14px;color:#a0aec0;transition:all .2s;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:rgba(255,107,53,.15);color:#fff;border-left-color:var(--primary)}
.nav-item .icon{width:20px;text-align:center;font-size:16px}
.sidebar .footer{padding:20px;margin-top:auto;font-size:11px;color:#666;border-top:1px solid rgba(255,255,255,.06)}
.main-wrap{margin-left:220px;flex:1;padding:0}
.topbar{background:var(--card);padding:16px 28px;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow);position:sticky;top:0;z-index:5}
.topbar h1{font-size:18px;font-weight:700}
.topbar .actions{display:flex;gap:8px;align-items:center}
.content{padding:24px 28px;max-width:1200px}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);display:flex;align-items:center;gap:16px;transition:transform .2s}
.stat-card:hover{transform:translateY(-2px)}
.stat-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.stat-icon.s1{background:#fff0e8;color:var(--primary)}
.stat-icon.s2{background:#e8f4ff;color:#3b82f6}
.stat-icon.s3{background:#e8ffe8;color:#07c160}
.stat-icon.s4{background:#fff8e8;color:#e6a817}
.stat-icon.s5{background:#ffe8f4;color:#e8356b}
.stat-val{font-size:26px;font-weight:800;color:var(--text)}
.stat-lbl{font-size:12px;color:var(--text2);margin-top:2px}
.card{background:var(--card);border-radius:var(--radius);padding:24px;margin-bottom:20px;box-shadow:var(--shadow)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.card-header h2{font-size:16px;font-weight:700}
.card-header .sub{font-size:12px;color:var(--text2)}
table{width:100%;border-collapse:collapse}
td,th{padding:12px 14px;text-align:left;font-size:13px}
th{color:var(--text2);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border)}
td{border-bottom:1px solid var(--border)}
tr:hover td{background:#fafafa}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.tag-monthly{background:#fff0e8;color:var(--primary)}
.tag-session{background:#e8f4ff;color:#3b82f6}
.tag-active{background:#e8ffe8;color:#07c160}
.tag-paused{background:#fff8e8;color:#e6a817}
.tag-expired{background:#ffe8e8;color:#fa5151}
.btn{padding:9px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{filter:brightness(.95);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn-primary{background:var(--primary);color:#fff}
.btn-outline{background:#fff;color:var(--primary);border:2px solid var(--primary)}
.btn-danger{background:#ff4d4f;color:#fff}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:6px}
.btn-icon{width:32px;height:32px;padding:0;justify-content:center;border-radius:8px}
.search-box{display:flex;gap:8px;align-items:center}
.search-box input{padding:8px 14px;border:2px solid var(--border);border-radius:8px;font-size:13px;width:200px;outline:none;transition:border .2s}
.search-box input:focus{border-color:var(--primary)}
.empty{text-align:center;padding:50px 20px;color:#bbb}
.empty .icon{font-size:48px;margin-bottom:12px}
.empty p{font-size:14px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);display:none;justify-content:center;align-items:center;z-index:999}
.modal{background:#fff;border-radius:16px;padding:28px;width:92%;max-width:480px;max-height:85vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95)translateY(10px)}to{opacity:1;transform:scale(1)translateY(0)}}
.modal h3{font-size:18px;margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:700;margin-bottom:4px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:8px;font-size:14px;outline:none;transition:border .2s}
.form-group input:focus,.form-group select:focus{border-color:var(--primary)}
.form-row{display:flex;gap:12px}
.form-row .form-group{flex:1}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:24px}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 28px;border-radius:24px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.2)}
.toast.show{opacity:1}
.phone-link{color:var(--primary);text-decoration:none;font-weight:600}
.phone-link:hover{text-decoration:underline}
@media(max-width:768px){.sidebar{width:60px;padding:16px 0}.sidebar .logo{font-size:14px;padding:0 10px 16px;text-align:center}.nav-item{justify-content:center;padding:14px 0;font-size:0}.nav-item .icon{font-size:20px}.main-wrap{margin-left:60px}.content{padding:16px}.stats-row{grid-template-columns:repeat(2,1fr)}}

</style>
</head>
