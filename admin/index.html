<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Coach Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}:root{--p:#FF6B35;--bg:#f5f6fa;--c:#fff;--t:#2d3436;--t2:#636e72;--b:#eee;--s:0 2px 12px rgba(0,0,0,.06);--r:12px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--t);font-size:14px;line-height:1.5;display:flex;min-height:100vh}
.sidebar{width:220px;background:linear-gradient(180deg,#1a1a2e,#16213e);color:#fff;padding:24px 0;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:10}
.sidebar .logo{padding:0 20px 24px;font-size:20px;font-weight:800}
.sidebar .logo span{color:var(--p)}.nav-item{display:flex;align-items:center;gap:10px;padding:12px 20px;cursor:pointer;font-size:14px;color:#a0aec0;transition:all .2s;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}.nav-item.active{background:rgba(255,107,53,.15);color:#fff;border-left-color:var(--p)}
.nav-item .icon{width:20px;text-align:center;font-size:16px}.sidebar .footer{padding:20px;margin-top:auto;font-size:11px;color:#666;border-top:1px solid rgba(255,255,255,.06)}
.main-wrap{margin-left:220px;flex:1}.topbar{background:var(--c);padding:16px 28px;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--s);position:sticky;top:0;z-index:5}
.topbar h1{font-size:18px;font-weight:700}.content{padding:24px 28px;max-width:1200px}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--c);border-radius:var(--r);padding:20px;box-shadow:var(--s);display:flex;align-items:center;gap:16px;transition:transform .2s}
.stat-card:hover{transform:translateY(-2px)}.stat-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.s1{background:#fff0e8;color:var(--p)}.s2{background:#e8f4ff;color:#3b82f6}.s3{background:#e8ffe8;color:#07c160}.s4{background:#fff8e8;color:#e6a817}.s5{background:#ffe8f4;color:#e8356b}
.stat-val{font-size:26px;font-weight:800}.stat-lbl{font-size:12px;color:var(--t2);margin-top:2px}
.card{background:var(--c);border-radius:var(--r);padding:24px;margin-bottom:20px;box-shadow:var(--s)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.card-header h2{font-size:16px;font-weight:700}.card-header .sub{font-size:12px;color:var(--t2)}
table{width:100%;border-collapse:collapse}td,th{padding:12px 14px;text-align:left;font-size:13px}
th{color:var(--t2);font-size:12px;font-weight:600;border-bottom:2px solid var(--b)}td{border-bottom:1px solid var(--b)}tr:hover td{background:#fafafa}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.tag-m{background:#fff0e8;color:var(--p)}.tag-s{background:#e8f4ff;color:#3b82f6}.tag-a{background:#e8ffe8;color:#07c160}.tag-p{background:#fff8e8;color:#e6a817}.tag-e{background:#ffe8e8;color:#fa5151}
.btn{padding:9px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn:hover{filter:brightness(.95)}.btn-p{background:var(--p);color:#fff}.btn-o{background:#fff;color:var(--p);border:2px solid var(--p)}.btn-d{background:#ff4d4f;color:#fff}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:6px}.search-box{display:flex;gap:8px;align-items:center}
.search-box input{padding:8px 14px;border:2px solid var(--b);border-radius:8px;font-size:13px;width:200px;outline:none}.search-box input:focus{border-color:var(--p)}
.empty{text-align:center;padding:50px 20px;color:#bbb}.empty .icon{font-size:48px;margin-bottom:12px}
.fg{margin-bottom:14px}.fg label{display:block;font-size:12px;font-weight:700;margin-bottom:4px;color:var(--t2)}
.fg input,.fg select{width:100%;padding:10px 14px;border:2px solid var(--b);border-radius:8px;font-size:14px;outline:none}
.fg input:focus,.fg select:focus{border-color:var(--p)}.fr{display:flex;gap:12px}.fr .fg{flex:1}
.modal-mask{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);display:none;justify-content:center;align-items:center;z-index:999}
.modal{background:#fff;border-radius:16px;padding:28px;width:92%;max-width:480px;max-height:85vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{font-size:18px;margin-bottom:20px}.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:24px}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 28px;border-radius:24px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}.toast.show{opacity:1}
</style>
</head>
<body>
<nav class="sidebar">
<div class="logo">🏋️ <span>Coach</span>Admin</div>
<div class="nav-item active" data-tab="0"><span class="icon">📊</span>仪表盘</div>
<div class="nav-item" data-tab="1"><span class="icon">👥</span>学员管理</div>
<div class="nav-item" data-tab="2"><span class="icon">📋</span>课程管理</div>
<div class="nav-item" data-tab="3"><span class="icon">✅</span>签到记录</div>
<div class="nav-item" data-tab="4"><span class="icon">⏸️</span>请假管理</div>
<div class="footer">v1.0</div>
</nav>
<div class="main-wrap">
<div class="topbar"><h1 id="pt">📊 仪表盘</h1><button class="btn btn-o btn-sm" id="br">🔄 刷新</button></div>
<div class="content" id="mc">加载中...</div>
</div>
<div class="modal-mask" id="mm"><div class="modal" id="md"></div></div>
<div class="toast" id="tx"></div>
<script src="admin.js"></script>
</body>
</html>
